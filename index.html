<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroChat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<script type="module">
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAHlv466bMEtiCf_Z0fHA9wgFfcQgqEsg",
  authDomain: "my-ai-app-cdfce.firebaseapp.com",
  projectId: "my-ai-app-cdfce",
  storageBucket: "my-ai-app-cdfce.firebasestorage.app",
  messagingSenderId: "306306694555",
  appId: "1:306306694555:web:90372c9f6d970544acf53e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
    }
});
</script>

<div class="chat-container">

    <div class="header">

        <div class="logo">
            <img src="logo.png" alt="NeuroChat">
        </div>

        <div class="title">
            <h2>NeuroChat</h2>
            <p>🟢 Online</p>
        </div>
      
      <button onclick="newChat()">➕</button>
        <button class="menu-btn" onclick="openSettings()">⋮</button>

    </div>
    
    <!-- CHAT BOX -->
<div class="chat-box" id="chatBox">

    <div class="message">
        <div class="avatar">🤖</div>

        <div class="ai-message">
            Hello! Main aapki madad ke liye ready hoon.
        </div>
    </div>

</div>

<!-- INPUT AREA -->
<div class="input-area">

    <input
        type="text"
        id="userInput"
        placeholder="Type your message...">

    <button onclick="sendMessage()">➤</button>

    <button onclick="startVoice()" class="mic-btn">🎤</button>

</div>

</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="settings-panel">

    <h3>☰ Menu</h3>

    <button onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <button onclick="clearChat()">🗑️ Clear Chat</button>

    <button onclick="logout()">🚪 Logout</button>

    <button onclick="closeSettings()">❌ Close</button>

</div>

<!-- SCRIPTS -->
<script type="module" src="firebase.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
